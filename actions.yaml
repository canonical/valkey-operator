status-detail:
  description: Gets statuses of the charm
  params:
    recompute:
      type: boolean
      default: false
      description: a boolean indicating whether a unit should recompute all statuses.

create-backup:
  description: |
    Stream a fresh RDB backup of this unit's Valkey instance to S3.
    Runs on the targeted unit (any unit, leader or follower).
    S3 credentials are taken from the related s3-integrator charm.

list-backups:
  description: |
    List all backup objects in the configured S3 bucket, newest first.
    Safe to run while another backup is uploading.
  params:
    output:
      type: string
      default: table
      description: Output format of the backup list, either "table" or "json".

restore-backup:
  description: |
    Restore the cluster's dataset from a backup in S3. Replaces the data on all units.
    Run on the leader unit. The backup-id must be one returned by list-backups.
    S3 credentials are taken from the related s3-integrator charm.
  params:
    backup-id:
      type: string
      description: The backup-id to restore, in the format produced by list-backups (YYYY-MM-DDTHH:MM:SSZ).
