type: charm

platforms:
  ubuntu@24.04:amd64:

parts:
  # "poetry-deps" part name is a magic constant
  # https://github.com/canonical/craft-parts/pull/901
  poetry-deps:
    plugin: nil
    build-packages:
      - curl
    override-build: |
      # Use environment variable instead of `--break-system-packages` to avoid failing on older
      # versions of pip that do not recognize `--break-system-packages`
      # `--user` needed (in addition to `--break-system-packages`) for Ubuntu >=24.04
      PIP_BREAK_SYSTEM_PACKAGES=true python3 -m pip install --user --upgrade pip==26.0.1  # renovate: charmcraft-pip-latest

      # Use uv to install poetry so that a newer version of Python can be installed if needed by poetry
      curl --proto '=https' --tlsv1.2 -LsSf https://github.com/astral-sh/uv/releases/download/0.10.0/uv-installer.sh | sh  # renovate: charmcraft-uv-latest
      # poetry 2.0.0 requires Python >=3.9
      if ! "$HOME/.local/bin/uv" python find '>=3.9'
      then
        # Use first Python version that is >=3.9 and available in an Ubuntu LTS
        # (to reduce the number of Python versions we use)
        "$HOME/.local/bin/uv" python install 3.10.12  # renovate: charmcraft-python-ubuntu-22.04
      fi
      "$HOME/.local/bin/uv" tool install --no-python-downloads --python '>=3.9' poetry==2.3.2 --with poetry-plugin-export==1.10.0  # renovate: charmcraft-poetry-latest

      ln -sf "$HOME/.local/bin/poetry" /usr/local/bin/poetry
  # "charm-poetry" part name is arbitrary; use for consistency
  # Avoid using "charm" part name since that has special meaning to charmcraft
  charm-poetry:
    # By default, the `poetry` plugin creates/primes these directories:
    # - lib, src
    #   (https://github.com/canonical/charmcraft/blob/9ff19c328e23b50cc06f04e8a5ad4835740badf4/charmcraft/parts/plugins/_poetry.py#L76-L78)
    # - venv
    #   (https://github.com/canonical/charmcraft/blob/9ff19c328e23b50cc06f04e8a5ad4835740badf4/charmcraft/parts/plugins/_poetry.py#L95
    #   https://github.com/canonical/craft-parts/blob/afb0d652eb330b6aaad4f40fbd6e5357d358de47/craft_parts/plugins/base.py#L270)
    plugin: poetry
    source: .
    after:
      - poetry-deps
    poetry-export-extra-args: ['--without-hashes']
    build-packages:
      - libffi-dev  # Needed to build Python dependencies with Rust from source
      - libssl-dev  # Needed to build Python dependencies with Rust from source
      - pkg-config  # Needed to build Python dependencies with Rust from source
      - libprotobuf-dev # Needed to build Valkey-glide
      - protobuf-compiler # Needed to build Valkey-glide
      - git
    build-environment:
      - PIP_BUILD_CONSTRAINT: constraints.txt # Workaround setuptools 82
    override-build: |
      # Workaround for https://github.com/canonical/charmcraft/issues/2068
      # rustup used to install rustc and cargo, which are needed to build Python dependencies with Rust from source
      if [[ "$CRAFT_PLATFORM" == ubuntu@20.04:* || "$CRAFT_PLATFORM" == ubuntu@22.04:* ]]
      then
        snap install rustup --classic
      else
        apt-get install rustup -y
      fi

      # If Ubuntu version < 24.04, rustup was installed from snap instead of from the Ubuntu
      # archive—which means the rustup version could be updated at any time. Print rustup version
      # to build log to make changes to the snap's rustup version easier to track
      rustup --version

      # rpds-py (Python package) >=0.19.0 requires rustc >=1.76, which is not available in the
      # Ubuntu 22.04 archive. Install rustc and cargo using rustup instead of the Ubuntu archive
      rustup set profile minimal
      rustup default 1.93.0  # renovate: charmcraft-rust-latest

      craftctl default
      # Include requirements.txt in *.charm artifact for easier debugging
      cp requirements.txt "$CRAFT_PART_INSTALL/requirements.txt"

actions:
  set:
    description: Set a key value pair in Valkey
    params:
      key:
        description: The key to set in Valkey
        type: string
      value:
        description: The value to set in Valkey
        type: string
      user:
        description: The username to use
        type: string

  get:
    description: Get a key value pair from Valkey
    params:
      key:
        description: The key to get from Valkey
        type: string
      user:
        description: The username to use
        type: string

  get-credentials:
    description: Action for fetching all available credentials from relations.

  start-continuous-writes:
    description: >
      Start a background daemon that continuously writes incrementing integers
      to a Valkey list using the relation-provided credentials. The daemon
      survives between action calls and can be stopped with stop-continuous-writes.
    params:
      sleep-interval:
        description: Seconds to sleep between writes (float, default 1.0)
        type: number
        default: 1.0

  stop-continuous-writes:
    description: >
      Stop the continuous-writes daemon and return the last written value and
      total count of successful writes. Use this after a disruptive operation
      to retrieve stats for consistency verification.

config:
  options:
    data-interfaces-version:
      description: Version of data interfaces to use
      type: int
      default: 1
    connection-source:
      description: >
        Whether to read connection info from the Valkey relation ("relation")
        or from the config options below ("config").
      type: string
      default: relation
    endpoints:
      description: >
        Comma-separated list of Valkey endpoints in "host:port" form.
        Required when connection-source is "config".
      type: string
      default: ""
    username:
      description: >
        Valkey username. Required when connection-source is "config".
      type: string
      default: ""
    password:
      description: >
        Valkey password. Required when connection-source is "config".
      type: string
      default: ""
    tls-enabled:
      description: >
        Whether TLS is enabled. Used when connection-source is "config".
      type: boolean
      default: false
    ca-cert:
      description: >
        Base64-encoded PEM CA certificate. Required when connection-source is
        "config" and tls-enabled is true.
      type: string
      default: ""
    cert:
      description: >
        Base64-encoded PEM client certificate. Required when connection-source
        is "config" and tls-enabled is true.
      type: string
      default: ""
    key:
      description: >
        Base64-encoded PEM client private key. Required when connection-source
        is "config" and tls-enabled is true.
      type: string
      default: ""
