# This file is still required due to data-platform-workflows not supporting unified
# charmcraft.yaml syntax. Details see:
# https://github.com/canonical/data-platform-workflows/issues/169
name: valkey
title: Valkey operator
summary: Operator for Valkey databases in Kubernetes and VM environments.
description: |
  Valkey is a flexible distributed key-value database that is optimized 
  for caching and other realtime workloads. This charmed operator deploys 
  and operates Valkey in Kubernetes and VM environments.
docs: https://canonical-charmed-valkey.readthedocs-hosted.com/latest/
source: https://github.com/canonical/valkey-operator
issues: https://github.com/canonical/valkey-operator/issues
website:
  - https://charmhub.io/valkey
  - https://github.com/canonical/valkey-operator
  - https://matrix.to/#/%23charmhub-data-platform%3Aubuntu.com

containers:
  valkey:
    resource: valkey-image
    mounts:
      - storage: data
        location: /var/lib/valkey/

resources:
  valkey-image:
    type: oci-image
    description: OCI Image for Valkey
    upstream-source: ghcr.io/canonical/charmed-valkey:9.0.1-26.04_edge

peers:
  valkey-peers:
    interface: valkey_peers
  status-peers:
    interface: status_peers

provides:
  valkey-client:
    interface: valkey_client
    optional: true

requires:
  client-certificates:
    interface: tls-certificates
    limit: 1
    optional: true
  certificate-transfer:
    interface: certificate_transfer
    optional: true
  ldap-ca-cert:
    interface: certificate_transfer
    limit: 1
    optional: true
  ldap:
    interface: ldap
    limit: 1
    optional: true

storage:
  data:
    type: filesystem
    location: /var/snap/charmed-valkey/common/var/lib/charmed-valkey
    description: storage for valkey data
    minimum-size: 1G
