# This file is still required due to data-platform-workflows not supporting unified
# charmcraft.yaml syntax. Details see:
# https://github.com/canonical/data-platform-workflows/issues/169
name: valkey
title: Valkey operator
summary: Operator for Valkey databases in Kubernetes and VM environments.
description: |
  Valkey is a flexible distributed key-value database that is optimized 
  for caching and other realtime workloads. This charmed operator deploys 
  and operates Valkey in Kubernetes and VM environments.
docs: https://canonical-charmed-valkey.readthedocs-hosted.com/en/latest/
source: https://github.com/canonical/charmed-valkey-operator
issues: https://github.com/canonical/charmed-valkey-operator/issues
website:
  - https://charmhub.io/valkey
  - https://github.com/canonical/charmed-valkey-operator
  - https://matrix.to/#/%23charmhub-data-platform%3Aubuntu.com

containers:
  valkey:
    resource: valkey-image

resources:
  valkey-image:
    type: oci-image
    description: OCI Image for Valkey
    upstream-source: ghcr.io/canonical/valkey:9.0.1-26.04-edge

peers:
  valkey-peers:
    interface: valkey_peers
  status-peers:
    interface: status_peers

requires:
  client-certificates:
    interface: tls-certificates
    limit: 1
    optional: true
  peer-certificates:
    interface: tls-certificates
    limit: 1
    optional: true
